[build]
  command = "vite build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Haru AI function route
[[redirects]]
  from = "/.netlify/functions/haru"
  to = "/.netlify/functions/haru"
  status = 200

# SPA catch-all — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
